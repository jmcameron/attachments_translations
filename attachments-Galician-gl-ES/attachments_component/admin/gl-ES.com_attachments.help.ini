ATTACH_HELP_000000_MAIN_TITLE="Documentación de Attachments"
ATTACH_HELP_000100_MAIN_VERSION="Esta versión é para Joomla 4 ou posterior"
ATTACH_HELP_000200_MAIN_CONTENTS="Contido"
ATTACH_HELP_010000_SECTION_TITLE="Introdución"
ATTACH_HELP_010100_TEXT="A extensión Attachments para Joomla permite cargar ficheiros e anexalos a artigos e outros tipos de contido. Inclúe un plugin para mostrar os anexos, un compoñente para cargalos e xestionalos e outros plugins de integración."
ATTACH_HELP_010200_WARNING="Esta versión de <em>Attachments</em> require unha versión compatible de Joomla."
ATTACH_HELP_010300_NOTE="Neste documento úsase <strong>elemento de contido</strong> para referirse a artigos, categorías e outros elementos aos que se poden anexar ficheiros ou URL."
ATTACH_HELP_010400_TEXT="Attachments está traducido a varios idiomas. Consulte {SECT_TRANS} para ver as traducións dispoñibles."
ATTACH_HELP_010500_TEXT="Pode subscribirse á lista de anuncios da extensión nesta páxina:"
ATTACH_HELP_010600_TEXT="Lista de correo de Attachments (%s)"
ATTACH_HELP_020000_SECTION_TITLE="Novidades de Attachments"
ATTACH_HELP_020050_TEXT="Attachments 4.1.3 engadiu compatibilidade con FontAwesome como alternativa ás iconas GIF herdadas."
ATTACH_HELP_020100_TEXT="Attachments 4.1.0 funciona con Joomla 4.0 ou posterior."
ATTACH_HELP_020200_TEXT="Attachments 4.1.0 engadiu o botón {attachments id=xxx} para seleccionar os anexos que se mostrarán."
ATTACH_HELP_020300_TEXT="Attachments 4.1.0 oculta os corchetes baleiros cando un anexo non ten descrición."
ATTACH_HELP_020400_TEXT="Attachments 4.1.0 permite abrir os anexos nunha xanela emerxente."
ATTACH_HELP_020500_TEXT="Attachments 4.1.0 engadiu o plugin de Busca intelixente."
ATTACH_HELP_030000_SECTION_TITLE="Características principais"
ATTACH_HELP_030100_TEXT="Compatibilidade completa co sistema ACL e de permisos de Joomla. Consulte {SECT_PERMS}."
ATTACH_HELP_030200_TEXT="Compatibilidade cos niveis de acceso, para decidir que grupos poden ver ou descargar cada anexo. Consulte {SECT_ACCESS}."
ATTACH_HELP_030300_TEXT="Os anexos poden xestionarse desde o editor de artigos: engadir, editar e eliminar."
ATTACH_HELP_030400_TEXT="Pódense crear anexos mentres se crea un artigo."
ATTACH_HELP_030500_TEXT="As listas de anexos da área pública actualízanse mediante Ajax."
ATTACH_HELP_030600_TEXT="Pódense &quot;anexar&quot; tanto ficheiros como URL."
ATTACH_HELP_030700_TEXT="A lista de anexos pode mostrarse en calquera lugar do elemento de contido."
ATTACH_HELP_030800_TEXT="Na administración:"
ATTACH_HELP_030900_TEXT="Pódense filtrar os anexos de elementos non publicados ou eliminados."
ATTACH_HELP_031000_TEXT="Filtrado da lista de artigos"
ATTACH_HELP_031100_TEXT="Ordenación por calquera cabeceira de columna."
ATTACH_HELP_031200_TEXT="Comandos administrativos de utilidade"
ATTACH_HELP_031300_TEXT="Os plugins de Attachments permiten anexar ficheiros a calquera elemento que invoque {ONCONTENTPREPARE}. Consulte {SECT_FILES}."
ATTACH_HELP_040000_SECTION_TITLE="Restricións de carga"
ATTACH_HELP_040100_TEXT="Attachments respecta os tipos de ficheiro e MIME permitidos polo Xestor multimedia de Joomla. Engada alí as extensións e tipos MIME que precise."
ATTACH_HELP_040200_WARNING="Non engada espazos entre os elementos das listas de extensións ou tipos MIME permitidos."
ATTACH_HELP_050000_SECTION_TITLE="Configuración"
ATTACH_HELP_050100_TEXT="Todas as opcións contrólanse desde Compoñentes → Attachments → Opcións."
ATTACH_HELP_050150_NOTE="A aparencia pode variar entre versións de Joomla, pero as opcións son equivalentes."
ATTACH_HELP_050200_SUBSECTION_TITLE="Opcións básicas"
ATTACH_HELP_050300_TEXT="A publicación automática determina se os novos anexos se publican inmediatamente. Se está desactivada, unha persoa con permisos terá que publicalos."
ATTACH_HELP_050400_TEXT="Pode definir unha mensaxe para explicar como se publicarán os anexos non publicados automaticamente."
ATTACH_HELP_050600_TEXT="<strong>Nomes dos campos personalizados 1-3:</strong> pode definir ata tres campos adicionais. Cada nome admite ata 40 caracteres e cada valor ata 255."
ATTACH_HELP_050700_HINT_TEXT="Engada un asterisco ao final do nome dun campo personalizado para ocultalo na área pública."
ATTACH_HELP_050800_TEXT="A lonxitude máxima recorta só o nome ou URL mostrado; non modifica o recurso real. O valor 0 non aplica este límite."
ATTACH_HELP_050900_TEXT="Esta opción determina onde se coloca a lista de anexos:"
ATTACH_HELP_051000_TEXT="Ao principio"
ATTACH_HELP_051100_TEXT="Ao final"
ATTACH_HELP_051200_TEXT="<em>Colocación personalizada</em>: a lista aparece onde se insira {attachments}."
ATTACH_HELP_051300_WARNING="Se un elemento non inclúe {attachments}, a lista mostrarase ao final."
ATTACH_HELP_051400_TEXT="O botón Inserir {attachments} coloca a etiqueta e o HTML necesario para ocultala cando non se substitúa."
ATTACH_HELP_051500_TEXT="No editor verá {attachments}; use a vista HTML para eliminar tamén as etiquetas span asociadas."
ATTACH_HELP_051600_WARNING="Actualice Joomla se a colocación personalizada non funciona coas descricións das categorías."
ATTACH_HELP_051700_TEXT="<em>Desactivada (filtrar)</em>: oculta as listas e elimina as etiquetas {attachments}."
ATTACH_HELP_051800_TEXT="<em>Desactivada (sen filtrar)</em>: oculta as listas pero conserva as etiquetas {attachments}."
ATTACH_HELP_052000_SUBSECTION_TITLE="Opcións de formato"
ATTACH_HELP_052100_TEXT="<strong>Mostrar títulos:</strong> engade unha fila que describe as columnas."
ATTACH_HELP_052200_TEXT="<strong>Mostrar descrición:</strong> controla se se mostra a descrición."
ATTACH_HELP_052300_TEXT="<strong>Mostrar creador:</strong> mostra o usuario que cargou o anexo."
ATTACH_HELP_052400_TEXT="<strong>Mostrar tamaño:</strong> controla se se mostra o tamaño."
ATTACH_HELP_052500_TEXT="<strong>Mostrar descargas:</strong> controla se se mostra o contador."
ATTACH_HELP_052600_WARNING="O contador só pode actualizarse no modo de descarga segura."
ATTACH_HELP_052650_TEXT="<strong>Mostrar data de creación:</strong> engade a data á lista."
ATTACH_HELP_052700_TEXT="<strong>Mostrar data de modificación:</strong> engade a data á lista."
ATTACH_HELP_052800_TEXT="<strong>Formato das datas:</strong> usa unha cadea compatible con <cite>JDate::format()</cite> e DateTime::format de PHP."
ATTACH_HELP_052900_TEXT="<strong>Orde da lista:</strong> permite escoller como se ordenan os anexos."
ATTACH_HELP_053000_TEXT="'<em>{LABEL}</em>' - Ordena alfabeticamente polo nome do ficheiro."
ATTACH_HELP_053100_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053200_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053300_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053400_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053500_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053600_TEXT="'<em>{LABEL}</em>' - Ordena polo nome mostrado ou URL; os valores baleiros aparecen primeiro."
ATTACH_HELP_053700_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_053800_TEXT="'<em>{LABEL}</em>' - Ordena polo nome do usuario que cargou o anexo."
ATTACH_HELP_053900_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054000_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054100_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054200_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054300_TEXT="'<em>{LABEL}</em>' - Ordena polo ID do anexo, normalmente na orde de creación."
ATTACH_HELP_054400_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054500_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_054600_TEXT="'<em>{LABEL}</em>'"
ATTACH_HELP_055000_SUBSECTION_TITLE="Opcións de visibilidade"
ATTACH_HELP_055100_TEXT="Estas opcións determinan cando se mostran os anexos na área pública."
ATTACH_HELP_055200_TEXT="<strong>Ocultar na páxina de inicio:</strong> impide mostrar anexos na páxina inicial."
ATTACH_HELP_055300_TEXT="<strong>Ocultar antes de Ler máis:</strong> ocúltaos na introdución e móstraos no artigo completo."
ATTACH_HELP_055400_TEXT="<strong>Ocultar nas páxinas de blog:</strong> non mostra anexos nesas vistas."
ATTACH_HELP_055500_TEXT="<strong>Ocultar agás nas vistas de artigos:</strong> mostra anexos só en artigos individuais."
ATTACH_HELP_055600_TEXT="<strong>Mostrar sempre nas categorías:</strong> ignora as demais opcións nas vistas de categorías."
ATTACH_HELP_055700_TEXT="<strong>Ocultar en categorías:</strong> escolle as categorías nas que non se mostrarán."
ATTACH_HELP_055800_TEXT="<strong>Mostrar a convidados:</strong> {DESCRIPTION} Os URL de acceso e rexistro configúranse nas opcións avanzadas."
ATTACH_HELP_055900_TEXT="<strong>Ocultar Engadir anexos:</strong> obriga a engadilos desde o formulario de edición."
ATTACH_HELP_057000_SUBSECTION_TITLE="Opcións avanzadas"
ATTACH_HELP_057050_TEXT="<strong>Tamaño máximo (MB):</strong> {DESCRIPTION}. Consulte {SECT_WARN}."
ATTACH_HELP_057100_TEXT="<strong>Caracteres prohibidos:</strong> evita nomes que causen problemas nos URL públicos."
ATTACH_HELP_057200_TEXT="<strong>Estilo CSS:</strong> permite substituír 'attachmentsList'. Consulte {SECT_STYLE}."
ATTACH_HELP_057300_TEXT="<strong>Modo de apertura:</strong> mesma xanela, nova xanela ou lapela."
ATTACH_HELP_057400_TEXT="<strong>Títulos personalizados:</strong> use 'ID Título' por liña ou 'entidade:ID Título'. Unha entrada sen ID aplícase globalmente."
ATTACH_HELP_057500_NOTE="Para cambiar globalmente o título copie ATTACH_ATTACHMENTS_TITLE de {BLOCK1} a {BLOCK2}."
ATTACH_HELP_057600_NOTE="qq-QQ representa o código do idioma. Non modifique a parte esquerda do signo igual."
ATTACH_HELP_057700_TEXT="<strong>Tempo límite:</strong> segundos para comprobar unha ligazón. Use 0 para desactivar a comprobación."
ATTACH_HELP_057800_TEXT="<strong>Iconas de URL:</strong> superpón unha frecha para URL válidos ou unha liña vermella para os non comprobados."
ATTACH_HELP_057900_TEXT="<strong>Suprimir obsoletos:</strong> oculta na administración anexos de elementos pai non publicados ou eliminados."
ATTACH_HELP_057940_TEXT="<strong>URL de acceso:</strong> {DESCRIPTION}"
ATTACH_HELP_057960_TEXT="<strong>URL de rexistro:</strong> {DESCRIPTION}"
ATTACH_HELP_058000_SUBSECTION_TITLE="Opcións de seguridade"
ATTACH_HELP_058100_TEXT="<strong>Descarga segura:</strong> impide o acceso directo ao directorio e comproba os permisos antes de entregar o ficheiro."
ATTACH_HELP_058200_TEXT="No modo seguro os URL reais poden ocultarse e só se redirixe aos usuarios autorizados."
ATTACH_HELP_058300_TEXT="Os anexos co nivel de acceso Público poden verse e descargarse por calquera persoa."
ATTACH_HELP_058400_HINT="Active a descarga segura se ten problemas con nomes Unicode, especialmente en Windows."
ATTACH_HELP_058500_TEXT="<strong>Modo de descarga segura:</strong> permite descargar o ficheiro ou mostralo no navegador."
ATTACH_HELP_058600_TEXT="<em>En liña</em>: o navegador mostra os tipos compatibles."
ATTACH_HELP_058700_TEXT="<em>Anexo</em>: descárgase sempre como ficheiro independente."
ATTACH_HELP_058800_TEXT="Os tipos que o navegador non poida mostrar descargaranse en ambos os modos."
ATTACH_HELP_059000_SUBSECTION_TITLE="Opcións de permisos"
ATTACH_HELP_059100_TEXT="Consulte {SECT_PERMS}."
ATTACH_HELP_060000_SECTION_TITLE="Permisos de Attachments"
ATTACH_HELP_060100_TEXT="Attachments usa o sistema ACL de Joomla para controlar quen pode crear, editar, eliminar, publicar e xestionar anexos."
ATTACH_HELP_060200_TEXT="Antes de configurar os permisos teña en conta este principio:"
ATTACH_HELP_060300_IMPORTANT="Todo anexo pertence a un elemento pai. O usuario debe poder editar primeiro ese elemento antes de aplicar os permisos específicos de Attachments."
ATTACH_HELP_060400_TEXT="Abra Attachments → Opcións → Permisos para configurar cada grupo."
ATTACH_HELP_060500_TEXT="Opcións de permisos"
ATTACH_HELP_060600_TEXT="Exemplo cos permisos do grupo Público."
ATTACH_HELP_060700_TEXT="Permisos dispoñibles:"
ATTACH_HELP_060800_TEXT="Permiso"
ATTACH_HELP_060900_TEXT="Descrición / Observacións"
ATTACH_HELP_061000_TEXT="Acción ACL"
ATTACH_HELP_062000_SUBSECTION_TITLE="Permisos predeterminados"
ATTACH_HELP_062100_TEXT="Ao instalar Attachments configúranse estes permisos básicos:"
ATTACH_HELP_062200_IMPORTANT="<strong>Comportamento básico dos permisos predeterminados</strong>"
ATTACH_HELP_062300_TEXT="Os Autores e grupos superiores poden engadir anexos aos elementos que poidan editar."
ATTACH_HELP_062400_TEXT="Os Autores e grupos superiores poden editar ou eliminar anexos dos elementos que poidan editar."
ATTACH_HELP_062500_TEXT="Os Editores e grupos superiores poden publicar ou retirar anexos desde a área pública."
ATTACH_HELP_062600_TEXT="Os autores non poden publicar os seus propios anexos de maneira predeterminada."
ATTACH_HELP_062700_TEXT="Cambie estes valores na lapela Permisos se precisa outro comportamento."
ATTACH_HELP_063000_SUBSECTION_TITLE="Escenarios habituais de permisos"
ATTACH_HELP_063100_TEXT="Exemplos de configuración:"
ATTACH_HELP_063200_TEXT="<strong>Escenario 1 - Permitir aos autores publicar os seus anexos</strong>"
ATTACH_HELP_063300_TEXT="No grupo Autor permita Editar o estado dos anexos propios e garde."
ATTACH_HELP_063400_TEXT="Configuración do escenario 1"
ATTACH_HELP_063500_TEXT="<strong>Escenario 2 - Permitir editar ou eliminar só os anexos propios</strong>"
ATTACH_HELP_063600_TEXT="No grupo Autor denegue editar e eliminar anexos de elementos pai propios e garde."
ATTACH_HELP_063700_TEXT="Configuración do escenario 2"
ATTACH_HELP_063800_TEXT="Os autores conservarán os permisos sobre os anexos que crearon, pero non sobre os creados por outras persoas."
ATTACH_HELP_063900_TEXT="Os grupos derivados poden ter permisos superiores que substitúan esta limitación."
ATTACH_HELP_064000_TEXT="Pode propoñer outros escenarios para incorporalos á documentación."
ATTACH_HELP_065000_SUBSECTION_TITLE="Outras observacións sobre permisos"
ATTACH_HELP_065100_TEXT="Se un usuario pode modificar o estado, verá Publicar Si/Non nos formularios. Os anexos non publicados só serán visibles para el mentres teña sesión iniciada."
ATTACH_HELP_070000_SECTION_TITLE="Visibilidade e niveis de acceso"
ATTACH_HELP_070100_TEXT="Cada anexo pode asignarse a Público, Rexistrado, Especial ou outro nivel creado no sitio."
ATTACH_HELP_070200_TEXT="<strong>Público</strong>: calquera visitante pode velo se o elemento pai é visible."
ATTACH_HELP_070300_TEXT="<strong>Rexistrado</strong>: só as persoas con sesión iniciada poden velo."
ATTACH_HELP_070400_TEXT="Os demais niveis dependen dos grupos asociados."
ATTACH_HELP_070500_TEXT="Os niveis de acceso ofrecen un control detallado sobre quen pode ver e descargar anexos."
ATTACH_HELP_070600_NOTE="Despois de crear un nivel pode ser necesario pechar e volver abrir a sesión para actualizar a caché."
ATTACH_HELP_080000_SECTION_TITLE="Nome ou URL mostrado"
ATTACH_HELP_080100_TEXT="Pode introducir unha etiqueta alternativa para mostrar no canto do nome ou URL completo. A opción de lonxitude máxima tamén pode xerar automaticamente un nome abreviado."
ATTACH_HELP_090000_SECTION_TITLE="Anexar URL"
ATTACH_HELP_090100_TEXT="Ademais de ficheiros, Attachments permite anexar URL mediante o botón Introducir un URL."
ATTACH_HELP_090200_TEXT="<strong>Comprobar existencia:</strong> consulta o servidor para obter o tipo e o tamaño. Pode desactivarse cando o URL sexa válido pero o servidor non responda."
ATTACH_HELP_090300_TEXT="<strong>URL relativo:</strong> úsese para recursos do propio sitio e desactive a comprobación de existencia."
ATTACH_HELP_090400_TEXT="As iconas indican se o URL foi validado. Pode cambialo manualmente ou desactivar a superposición global."
ATTACH_HELP_100000_SECTION_TITLE="A que elementos se poden anexar ficheiros?"
ATTACH_HELP_100100_TEXT="Con plugins axeitados pódense anexar ficheiros ou URL a artigos, categorías e outros elementos que usen {ONCONTENTPREPARE}."
ATTACH_HELP_100200_WARNING="Os anexos das categorías só se mostran se a descrición está activada e non está baleira."
ATTACH_HELP_100300_TEXT="Consulte o manual de desenvolvemento de plugins de Attachments:"
ATTACH_HELP_100400_TEXT="Sitio web de Attachments (http://jmcameron.net/attachments)"
ATTACH_HELP_100500_WARNING="O manual histórico pode precisar actualización para as versións actuais de Joomla."
ATTACH_HELP_110000_SECTION_TITLE="Estilo CSS da lista"
ATTACH_HELP_110100_TEXT="A lista usa clases CSS que poden personalizarse. Consulte <strong>media/com_attachments/css/attachments_list.css</strong> e use un nome distinto de 'attachmentsList'."
ATTACH_HELP_110200_TEXT="<strong>Substitución mediante a plantilla:</strong> copie o CSS á área de substitución da plantilla para conservar os cambios tras actualizar."
ATTACH_HELP_110300_TEXT="Substitúa TEMPLATE polo directorio da súa plantilla e modifique alí a copia."
ATTACH_HELP_120000_SECTION_TITLE="Iconas dos tipos de ficheiro"
ATTACH_HELP_120100_TEXT="Para engadir un novo tipo de icona:"
ATTACH_HELP_120200_TEXT="Engada a icona no directorio de iconas da extensión."
ATTACH_HELP_120300_TEXT="Asocie a extensión ou tipo MIME coa icona na configuración de tipos de ficheiro."
ATTACH_HELP_120400_TEXT="Garde unha copia dos ficheiros personalizados antes de actualizar."
ATTACH_HELP_120500_TEXT="<strong>NOTA:</strong> use a substitución de imaxes da plantilla para conservar iconas personalizadas."
ATTACH_HELP_130000_SECTION_TITLE="Comandos das utilidades administrativas"
ATTACH_HELP_130100_TEXT="A administración ofrece estes comandos:"
ATTACH_HELP_130200_TEXT="<strong>Conservar a táboa MySQL:</strong> evita eliminar os datos ao desinstalar."
ATTACH_HELP_130300_TEXT="<strong>Reinstalar permisos:</strong> restaura as regras predeterminadas do ACL."
ATTACH_HELP_130400_TEXT="<strong>Rexenerar nomes do sistema:</strong> corrixe as rutas despois dunha migración."
ATTACH_HELP_130500_TEXT="A rexeneración é útil ao migrar entre Windows e Linux."
ATTACH_HELP_130600_TEXT="En Windows comprobe os permisos de escritura do directorio e dos ficheiros."
ATTACH_HELP_130700_TEXT="Os nomes Unicode poden precisar un tratamento manual nalgunhas ferramentas de arquivo de Windows."
ATTACH_HELP_130800_TEXT="<strong>Eliminar espazos:</strong> substitúe os espazos por guións baixos."
ATTACH_HELP_130900_TEXT="<strong>Actualizar tamaños:</strong> recalcula o tamaño de todos os ficheiros."
ATTACH_HELP_131000_TEXT="<strong>Comprobar ficheiros:</strong> lista os anexos cuxos ficheiros non existen."
ATTACH_HELP_131100_TEXT="<strong>Validar URL:</strong> comproba e actualiza a validez de cada ligazón."
ATTACH_HELP_131200_NOTE="Se o navegador pide reenviar a solicitude, pode aceptar para executar o comando."
ATTACH_HELP_140000_SECTION_TITLE="Avisos e resolución de problemas"
ATTACH_HELP_140100_TEXT="<strong>Use a descarga segura para anexos privados.</strong> O modo non seguro almacénaos nun directorio público accesible mediante o URL completo."
ATTACH_HELP_140200_TEXT="O directorio de carga créase automaticamente. Se falla, créao manualmente e configure permisos de escritura axeitados."
ATTACH_HELP_140300_TEXT="Se non pode cargar un tipo de ficheiro, revise as extensións e tipos MIME permitidos no Xestor multimedia."
ATTACH_HELP_140400_TEXT="Se os anexos non se ven na área pública, revise:"
ATTACH_HELP_140500_TEXT="O anexo debe estar publicado."
ATTACH_HELP_140600_TEXT="O artigo ou elemento pai debe estar publicado."
ATTACH_HELP_140700_TEXT="O usuario debe cumprir o nivel de acceso. Revise tamén {DEFACCLEVEL}."
ATTACH_HELP_140800_TEXT="Active o plugin Contido - Attachments."
ATTACH_HELP_140900_TEXT="Comprobe que o nivel de acceso do plugin sexa Público."
ATTACH_HELP_141000_TEXT="Limpe a caché do sitio e actualice a páxina."
ATTACH_HELP_141100_TEXT="As plantillas personalizadas poden precisar adaptación para mostrar anexos nas descricións das categorías."
ATTACH_HELP_141200_TEXT="Se o servidor limita o tamaño, pode ser necesario modificar .htaccess ou a configuración de PHP."
ATTACH_HELP_141300_TEXT="Axuste o valor máximo segundo as necesidades e os límites do servidor."
ATTACH_HELP_141400_TEXT="En Windows Vista os URL con {LOCALHOST} poden verse afectados por conflitos entre IPv4 e IPv6."
ATTACH_HELP_141500_TEXT="Comente a liña con {IPV6HOST1} no ficheiro {HOSTS}."
ATTACH_HELP_141600_TEXT="Active a descarga segura se os nomes Unicode fallan en Windows."
ATTACH_HELP_141700_TEXT="Ao crear un artigo, os novos anexos quedan temporalmente asociados ao usuario ata que se garda por primeira vez. Non comparta a mesma conta para crear artigos simultaneamente."
ATTACH_HELP_141800_TEXT="Consulte os recursos de axuda do proxecto se o problema non aparece nesta páxina."
ATTACH_HELP_141900_TEXT="Foros de Attachments en {FORUMS}"
ATTACH_HELP_150000_SECTION_TITLE="Actualización"
ATTACH_HELP_150100_TEXT="Pode actualizar de dúas maneiras:"
ATTACH_HELP_150200_TEXT="Instale a nova versión sobre a anterior; non é necesario desinstalar nin mover os anexos."
ATTACH_HELP_150300_TEXT="<strong>Recomendado:</strong> use o actualizador de extensións de Joomla para buscar e instalar novas versións."
ATTACH_HELP_160000_SECTION_TITLE="Desinstalación"
ATTACH_HELP_160100_TEXT="Para conservar os anexos, copie {ATTACH_DIR} e a táboa {ATTACH_TBL}, ou use {DISABLE_SQL} en {SECT_UTILS}."
ATTACH_HELP_160200_TEXT="Se non quere conservalos, elimine primeiro os anexos e despois o directorio de carga."
ATTACH_HELP_160300_TEXT="Para desinstalar vaia ao Xestor de extensións e seleccione só o paquete correspondente."
