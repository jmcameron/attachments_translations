; Galician translation

; NOTE TO TRANSLATORS:
; Do not translate the '{attachments}' part of any of the right-hand strings.

INSERT_ATTACHMENTS_ID_TOKEN="Inserir a etiqueta {attachments id=xxx}"
INSERT_ATTACHMENTS_ID_TOKEN_DESCRIPTION="Sitúe o cursor no lugar no que queira mostrar a lista de anexos na área pública e prema este botón. Inserirase a etiqueta {attachments} usada pola opción de colocación personalizada. Tamén se engadirá código HTML para ocultar a etiqueta cando non se mostren listas de anexos."
ATTACH_INSERT_ATTACHMENTS_ID_TOKEN_BUTTON_PLUGIN_DESCRIPTION="O plugin para inserir etiquetas de anexos engade un botón que permite inserir unha etiqueta personalizada {attachments id=xxx} ao editar artigos ou categorías."
ATTACH_INSERT_ATTACHMENTS_ID_TOKEN_PLUGIN_ATTACHMENTS_FRAMEWORK_NOT_AVAILABLE="O plugin para inserir etiquetas de ID de anexos require que o framework de Attachments estea instalado e activado."
