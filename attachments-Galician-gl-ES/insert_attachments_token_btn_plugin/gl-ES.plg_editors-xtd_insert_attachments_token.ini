ATTACH_ATTACHMENTS_TOKEN="Inserir a etiqueta {attachments}"
ATTACH_ATTACHMENTS_TOKEN_ALREADY_PRESENT="A etiqueta {attachments} xa existe. Só pode aparecer unha vez no texto!"
ATTACH_ATTACHMENTS_TOKEN_DESCRIPTION="Sitúe o cursor no lugar no que queira mostrar a lista de anexos na área pública e prema este botón. Isto engade a etiqueta {attachments} usada pola opción de colocación personalizada. Tamén se engade código HTML para ocultar a etiqueta cando non se mostre a lista de anexos."
ATTACH_INSERT_ATTACHMENTS_TOKEN_BUTTON_PLUGIN_DESCRIPTION="Este plugin engade un botón que permite inserir unha etiqueta {attachments} de colocación personalizada ao editar artigos ou categorías."
ATTACH_INSERT_ATTACHMENTS_TOKEN_PLUGIN_ATTACHMENTS_FRAMEWORK_NOT_AVAILABLE="O plugin para inserir a etiqueta {attachments} require que o compoñente Attachments e o framework de Attachments estean instalados e activados."
